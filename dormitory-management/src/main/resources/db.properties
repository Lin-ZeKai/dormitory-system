# JDBC 数据库连接配置（由 DBUtil 读取）
# 部署前请根据本地 MySQL 环境修改 username 和 password

# MySQL 5.7 驱动类
jdbc.driver=com.mysql.jdbc.Driver
# 连接地址：数据库名 dormitory_db，字符编码 utf8
jdbc.url=jdbc:mysql://localhost:3306/dormitory_db?useUnicode=true&characterEncoding=utf8&useSSL=false
# 数据库用户名
jdbc.username=root
# 数据库密码
jdbc.password=123456
