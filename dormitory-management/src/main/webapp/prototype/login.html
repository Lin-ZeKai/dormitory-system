<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 宿舍考勤与管理系统</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo">
        <h1>宿舍考勤与管理系统</h1>
        <p>Dormitory Attendance Management System</p>
    </div>

    <!-- 后续接入：POST /login  由 LoginServlet 处理 -->
    <form id="loginForm" action="/login" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="请输入学号/工号" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="role">登录身份</label>
            <select id="role" name="role" class="form-control">
                <option value="student">学生</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <!-- 后端错误信息占位：<%= errorMsg %> -->
        <div id="errorMsg" class="alert alert-warning" style="display:none;">用户名或密码错误</div>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
    </form>

    <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    bindPrototypeForm('loginForm', '【原型提示】登录表单填写完成。接入后端后 POST /login 验证并跳转首页。');
</script>
</body>
</html>
